<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KP Show NF</title>
    <style>
        /* Modern Dark Theme Variables */
        :root {
            --bg-color: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-color: #e50914; /* Netflix Red */
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #2b1010, transparent);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-dim);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        #button-container {
            display: grid;
            gap: 16px;
        }

        /* Premium Glassmorphic Button Style */
        .season-btn {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        /* Hover Effects */
        .season-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
            transform: scale(1.03);
            box-shadow: 0 10px 30px rgba(229, 9, 20, 0.2);
        }

        /* Arrow Icon Styling */
        .season-btn::after {
            content: '→';
            font-size: 1.2rem;
            opacity: 0.5;
            transition: transform 0.3s ease;
        }

        .season-btn:hover::after {
            transform: translateX(5px);
            opacity: 1;
            color: var(--accent-color);
        }

        /* Responsive design for smaller screens */
        @media (max-width: 480px) {
            h1 { font-size: 1.6rem; }
            .season-btn { padding: 16px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Explore Kapil Shows</h1>
        <p>Select a season to start watching</p>
        
        <div id="button-container">
            </div>
    </div>

    <script>
        // Fetching from season.json
        fetch('season.json')
            .then(response => {
                if (!response.ok) throw new Error("JSON load nahi ho payi");
                return response.json();
            })
            .then(data => {
                const container = document.getElementById('button-container');
                data.seasons.forEach(season => {
                    const btn = document.createElement('a');
                    btn.href = season.link;
                    btn.className = 'season-btn';
                    btn.innerHTML = `<span>${season.name}</span>`;
                    container.appendChild(btn);
                });
            })
            .catch(err => {
                console.error(err);
                document.getElementById('button-container').innerHTML = 
                    '<p style="color: red;">JSON file load karne mein problem hui.</p>';
            });
    </script>
</body>
</html>
