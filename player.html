<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Player Extract</title>
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        .video-js { width: 100vw !important; height: 100vh !important; }
        
        /* Force Play Overlay */
        #tap-to-play {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; background: #000; display: flex;
            justify-content: center; align-items: center; color: #fff;
            cursor: pointer; font-family: sans-serif; font-weight: bold;
        }
        .play-btn { padding: 15px 30px; border: 2px solid #dc3545; border-radius: 50px; background: rgba(220, 53, 69, 0.1); }
    </style>
</head>
<body>

    <div id="tap-to-play" onclick="goExtreme()">
        <div class="play-btn">START PLAYER</div>
    </div>

    <video id="my-player" class="video-js vjs-default-skin" playsinline></video>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        // Link yahan se uthayega
        const videoUrl = localStorage.getItem("videoLink") || "PASTE_YOUR_LINK_HERE";
        var player = videojs('my-player', {
            controls: true,
            fluid: false,
            autoplay: false
        });

        async function goExtreme() {
            // 1. Fullscreen Request
            const el = document.documentElement;
            if (el.requestFullscreen) { await el.requestFullscreen(); }
            else if (el.webkitRequestFullscreen) { await el.webkitRequestFullscreen(); }

            // 2. Hide Overlay
            document.getElementById('tap-to-play').style.display = 'none';

            // 3. Set Source and Play
            player.src({
                src: videoUrl,
                type: videoUrl.includes('m3u8') ? 'application/x-mpegURL' : 'video/mp4'
            });

            // 4. Force Landscape (300ms delay for stability)
            setTimeout(() => {
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(e => console.log("System Auto-Rotate is Off"));
                }
            }, 300);

            player.play();
        }
    </script>
</body>
</html>
