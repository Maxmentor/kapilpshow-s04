<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate M3U8 Player</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/forest/index.css" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        .video-js { width: 100vw !important; height: 100vh !important; }

        /* Custom Play Button Overlay */
        #custom-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; cursor: pointer; font-family: sans-serif;
        }

        .play-circle {
            width: 80px; height: 80px; background: #e50914; 
            border-radius: 50%; display: flex; justify-content: center; 
            align-items: center; font-size: 30px; margin-bottom: 10px;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.5);
        }
    </style>
</head>
<body>

    <div id="custom-overlay" onclick="startPlayer()">
        <div class="play-circle">▶</div>
        <p>TAP TO WATCH FULLSCREEN</p>
    </div>

    <video id="my-video" class="video-js vjs-theme-forest" controls preload="auto" playsinline></video>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <script>
        const videoSrc = localStorage.getItem("videoLink") || "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8";
        const player = videojs('my-video');

        function startPlayer() {
            // 1. Source Load Karo
            player.src({
                src: videoSrc,
                type: 'application/x-mpegURL'
            });

            // 2. Fullscreen Trigger
            const container = document.documentElement;
            if (container.requestFullscreen) {
                container.requestFullscreen();
            } else if (container.webkitRequestFullscreen) {
                container.webkitRequestFullscreen();
            }

            // 3. Screen Orientation Lock (Landscape)
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(function(error) {
                    console.log("Orientation lock skip: ", error);
                });
            }

            // 4. Play and Hide Overlay
            document.getElementById('custom-overlay').style.display = 'none';
            player.play();
        }

        // Handle Errors
        player.on('error', function() {
            alert("Video nahi chal rahi. Shayad link galat hai ya expired hai.");
        });
    </script>
</body>
</html>
